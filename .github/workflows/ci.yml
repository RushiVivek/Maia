name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type-check
        run: deno task check
      - name: Lint
        run: deno task lint
      - name: Format check
        run: deno fmt --check
      # The offline suite mocks GitHub; the real-vault e2e stays skipped
      # because MAIA_E2E is unset here, so no PAT is ever needed in CI.
      - name: Test
        run: deno task test
